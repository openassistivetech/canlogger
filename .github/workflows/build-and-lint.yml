name: Build & lint

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-and-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential debhelper dpkg-dev pandoc lintian

      - name: Build package
        run: dpkg-buildpackage -us -uc -b

      - name: Run lintian
        run: lintian --fail-on error,warning ../*.changes
