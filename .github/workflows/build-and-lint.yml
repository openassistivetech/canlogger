name: Build & lint

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  build-and-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential debhelper dpkg-dev pandoc lintian

      - name: Build package
        run: dpkg-buildpackage -us -uc -b

      - name: Run lintian
        run: lintian --fail-on error,warning ../*.changes

  lint-scripts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      # canlog-upload is bash; shellcheck reads the shebang, so the
      # extensionless filename is fine. shellcheck is preinstalled on the runner.
      - name: ShellCheck (bash scripts)
        run: shellcheck canlog-upload

      # canlog-rotate is python3. ruff lints an explicitly-passed file
      # regardless of extension. Pinned for reproducible CI; bump deliberately.
      - name: Ruff (Python scripts)
        run: pipx run --spec ruff==0.15.20 ruff check canlog-rotate
