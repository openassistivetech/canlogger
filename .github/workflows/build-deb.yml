name: Build .deb

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential debhelper dpkg-dev pandoc

      - name: Build package
        run: dpkg-buildpackage -us -uc -b

      - name: Get version
        id: version
        run: echo "version=$(dpkg-parsechangelog -S Version)" >> "$GITHUB_OUTPUT"

      - name: Upload .deb
        uses: actions/upload-artifact@v4
        with:
          name: canlogger_${{ steps.version.outputs.version }}
          path: |
            ../*.deb
            ../*.buildinfo
            ../*.changes
